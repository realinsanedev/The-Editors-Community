<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download — Editors Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --purple:        #6622ba;
            --purple-mid:    #7c3aed;
            --purple-border: rgba(102,34,186,0.22);
            --bg:            #f3f4f6;
            --text-primary:  #111111;
            --text-secondary:#6b7280;
            --glass-border:  rgba(255,255,255,0.60);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter Tight', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            zoom: 1.1;
        }

        /* ── Exact same background blob as main site ── */
        .background-blob {
            position: fixed;
            top: -30vh;
            right: -20vw;
            width: 130vw;
            height: 130vh;
            background: radial-gradient(circle, rgba(102,34,186,0.45) 0%, rgba(243,244,246,0) 65%);
            z-index: 0;
            pointer-events: none;
        }

        /* Subtle grid overlay */
        .grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(102,34,186,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102,34,186,0.04) 1px, transparent 1px);
            background-size: 52px 52px;
            pointer-events: none; z-index: 0;
        }

        /* ══════════════════════════════════
           TOP NAV BAR — Frosted glass
        ══════════════════════════════════ */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 58px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px;
            background: rgba(243,244,246,0.72);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid rgba(255,255,255,0.55);
            box-shadow: 0 1px 0 rgba(102,34,186,0.07), 0 4px 20px rgba(102,34,186,0.05);
            z-index: 100;
        }

        .back-btn {
            display: inline-flex; align-items: center; gap: 7px;
            color: var(--text-secondary);
            font-size: 13px; font-weight: 600;
            text-decoration: none;
            padding: 7px 16px 7px 11px;
            border-radius: 30px;
            background: rgba(255,255,255,0.35);
            border: 1px solid rgba(255,255,255,0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 10px rgba(102,34,186,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
            transition: all 0.22s ease;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.60);
            color: var(--text-primary);
            transform: translateX(-2px);
            box-shadow: 0 4px 18px rgba(102,34,186,0.13), inset 0 1px 0 rgba(255,255,255,0.95);
        }

        .brand { font-size: 13px; font-weight: 800; color: var(--text-secondary); letter-spacing: 0.2px; }
        .brand em { color: var(--purple); font-style: normal; }

        /* ══════════════════════════════════
           PAGE WRAPPER
        ══════════════════════════════════ */
        .page {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 70px 16px 76px;
        }

        /* ══════════════════════════════════
           MAIN GLASS CARD
        ══════════════════════════════════ */
        .card {
            width: 100%; max-width: 460px;
            position: relative;
            background: rgba(255,255,255,0.48);
            backdrop-filter: blur(36px) saturate(1.6);
            -webkit-backdrop-filter: blur(36px) saturate(1.6);
            border: 1px solid rgba(255,255,255,0.72);
            border-radius: 32px;
            padding: 40px 36px 34px;
            box-shadow:
                0 8px 32px rgba(102,34,186,0.09),
                0 32px 72px rgba(102,34,186,0.06),
                inset 0 1px 0 rgba(255,255,255,0.98),
                inset 0 -1px 0 rgba(255,255,255,0.40);
            animation: riseIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
            overflow: hidden;
        }

        /* Inner specular highlight */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60%;
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
            border-radius: 32px 32px 0 0;
            pointer-events: none;
        }

        @keyframes riseIn {
            from { opacity:0; transform: translateY(36px) scale(0.96); }
            to   { opacity:1; transform: translateY(0) scale(1); }
        }

        /* ── Icon ring ── */
        .icon-ring {
            width: 74px; height: 74px;
            margin: 0 auto 20px;
            border-radius: 22px;
            background: rgba(255,255,255,0.38);
            border: 1.5px solid rgba(255,255,255,0.70);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow:
                0 4px 18px rgba(102,34,186,0.14),
                inset 0 1px 0 rgba(255,255,255,0.95),
                inset 0 -1px 0 rgba(102,34,186,0.08);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .icon-ring:hover {
            transform: translateY(-4px) rotate(-4deg);
            box-shadow: 0 12px 36px rgba(102,34,186,0.22), inset 0 1px 0 rgba(255,255,255,0.95);
        }
        .icon-ring svg { color: var(--purple); }

        /* ── Pill ── */
        .pill {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(102,34,186,0.09);
            border: 1px solid rgba(102,34,186,0.20);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--purple);
            font-size: 10px; font-weight: 800;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 4px 13px; border-radius: 30px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
            margin-bottom: 14px;
        }

        /* ── Title ── */
        .dl-title {
            font-size: 23px; font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.6px; line-height: 1.2;
            margin-bottom: 8px; text-align: center;
        }

        .dl-sub {
            font-size: 12.5px; font-weight: 500;
            color: var(--text-secondary);
            text-align: center; margin-bottom: 22px;
        }

        /* ── Chips row ── */
        .chips {
            display: flex; align-items: center; justify-content: center;
            gap: 7px; flex-wrap: wrap; margin-bottom: 26px;
        }

        .chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.42);
            border: 1px solid rgba(255,255,255,0.70);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-secondary);
            font-size: 11.5px; font-weight: 600;
            padding: 5px 13px; border-radius: 30px;
            box-shadow: 0 1px 6px rgba(102,34,186,0.06), inset 0 1px 0 rgba(255,255,255,0.9);
            transition: all 0.2s ease;
        }
        .chip:hover {
            background: rgba(255,255,255,0.65);
            box-shadow: 0 3px 12px rgba(102,34,186,0.10), inset 0 1px 0 rgba(255,255,255,0.95);
        }
        .chip svg { color: var(--purple); flex-shrink: 0; }

        /* ── Glass Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255,255,255,0.70) 20%,
                rgba(102,34,186,0.18) 50%,
                rgba(255,255,255,0.70) 80%,
                transparent 100%);
            margin: 0 0 24px;
        }

        /* ── Password glass panel ── */
        .pass-panel {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px;
            background: rgba(255,255,255,0.30);
            border: 1px solid rgba(255,255,255,0.60);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 14px;
            padding: 13px 16px;
            margin-bottom: 18px;
            box-shadow: 0 2px 12px rgba(102,34,186,0.07), inset 0 1px 0 rgba(255,255,255,0.85);
        }

        .pass-left {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
        }
        .pass-left svg { color: var(--purple); }

        .pass-right {
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }

        .pass-tag {
            font-size: 13.5px; font-weight: 800;
            color: var(--purple);
            background: rgba(102,34,186,0.10);
            border: 1px solid rgba(102,34,186,0.16);
            padding: 3px 10px; border-radius: 7px;
            backdrop-filter: blur(6px);
        }

        .copy-btn {
            display: inline-flex; align-items: center; gap: 5px;
            background: linear-gradient(135deg, #7c3aed 0%, #6622ba 100%);
            border: none; color: white;
            font-size: 11.5px; font-weight: 700; font-family: inherit;
            padding: 5px 12px; border-radius: 8px;
            cursor: pointer; white-space: nowrap;
            box-shadow: 0 3px 10px rgba(102,34,186,0.30), inset 0 1px 0 rgba(255,255,255,0.18);
            transition: all 0.2s ease;
        }
        .copy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 16px rgba(102,34,186,0.40); }
        .copy-btn.copied { background: linear-gradient(135deg, #10b981, #059669); }

        /* ── Download Button ── */
        .dl-btn {
            display: flex; align-items: center; justify-content: center; gap: 11px;
            width: 100%; padding: 16px 28px;
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 45%, #6622ba 100%);
            color: white; border: none; font-family: inherit;
            font-size: 15px; font-weight: 800;
            border-radius: 16px; cursor: pointer;
            text-decoration: none;
            box-shadow:
                0 12px 32px rgba(102,34,186,0.42),
                0 3px 8px rgba(102,34,186,0.22),
                inset 0 1px 0 rgba(255,255,255,0.22),
                inset 0 -2px 0 rgba(0,0,0,0.14);
            position: relative; overflow: hidden;
            transition: all 0.28s cubic-bezier(0.16,1,0.3,1);
            margin-bottom: 14px; letter-spacing: -0.2px;
        }

        /* Glass sheen */
        .dl-btn::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
            border-radius: 16px 16px 0 0;
        }

        /* Shimmer sweep */
        .dl-btn .sweep {
            position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.20), transparent);
            animation: sweep 2.8s ease-in-out infinite;
        }
        @keyframes sweep {
            0%   { left: -100%; }
            60%  { left: 160%; }
            100% { left: 160%; }
        }

        .dl-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow:
                0 20px 48px rgba(102,34,186,0.50),
                0 6px 14px rgba(102,34,186,0.26),
                inset 0 1px 0 rgba(255,255,255,0.26),
                inset 0 -2px 0 rgba(0,0,0,0.16);
        }
        .dl-btn:active { transform: scale(0.98); }
        .dl-btn span, .dl-btn svg { position: relative; z-index: 1; }

        .dl-btn.success {
            background: linear-gradient(135deg, #34d399, #10b981, #059669);
            box-shadow: 0 12px 32px rgba(16,185,129,0.42);
        }

        /* ── Secondary actions ── */
        .sec-actions {
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .sec-btn {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 600; color: var(--text-secondary);
            background: rgba(255,255,255,0.28);
            border: 1px solid rgba(255,255,255,0.58);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 9px; padding: 7px 13px;
            cursor: pointer; font-family: inherit;
            text-decoration: none;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.80);
            transition: all 0.18s ease;
        }
        .sec-btn:hover {
            background: rgba(255,255,255,0.52);
            color: var(--text-primary);
            box-shadow: 0 3px 12px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.95);
        }
        .sec-btn.danger:hover { color: #ef4444; border-color: rgba(239,68,68,0.22); }

        /* ── Notice strip ── */
        .notice {
            display: flex; align-items: flex-start; gap: 9px;
            margin-top: 18px;
            background: rgba(255,255,255,0.20);
            border: 1px solid rgba(255,255,255,0.50);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 11px; padding: 11px 14px;
            font-size: 11.5px; color: var(--text-secondary); line-height: 1.55;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.70);
        }
        .notice svg { color: #f59e0b; flex-shrink: 0; margin-top: 1px; }

        /* ══════════════════════════════════
           BOTTOM FOOTER BAR
        ══════════════════════════════════ */
        .footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            padding: 12px 16px;
            font-size: 11.5px; color: var(--text-secondary);
            background: rgba(243,244,246,0.72);
            backdrop-filter: blur(18px) saturate(1.4);
            -webkit-backdrop-filter: blur(18px) saturate(1.4);
            border-top: 1px solid rgba(255,255,255,0.55);
            box-shadow: 0 -1px 0 rgba(102,34,186,0.06);
            z-index: 100;
        }
        .footer a { color: var(--purple); text-decoration: none; font-weight: 700; }
        .footer a:hover { text-decoration: underline; }

        /* ══════════════════════════════════
           RESPONSIVE
        ══════════════════════════════════ */
        @media (max-width: 520px) {
            .card { padding: 28px 18px 24px; border-radius: 24px; }
            .dl-title { font-size: 19px; }
            .topbar { padding: 0 14px; }
        }
    </style>
</head>
<body>

    <!-- ── Background (matches main site exactly) ── -->
    <div class="background-blob"></div>
    <div class="grid"></div>

    <!-- ── Top nav ── -->
    <div class="topbar">
        <a class="back-btn" id="backBtn" href="/">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Back
        </a>
        <div class="brand">Editors <em>Community</em></div>
    </div>

    <!-- ── Main page ── -->
    <div class="page">
        <div class="card">

            <!-- Icon -->
            <div class="icon-ring" id="iconRing"></div>

            <!-- Pill + Title -->
            <div style="text-align:center;">
                <div class="pill">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Shared File
                </div>
            </div>

            <h1 class="dl-title" id="dlTitle">Loading…</h1>
            <p  class="dl-sub"   id="dlSub">Editors Community · Software</p>

            <!-- Chips -->
            <div class="chips" id="chips"></div>

            <div class="divider"></div>

            <!-- Password panel -->
            <div class="pass-panel">
                <div class="pass-left">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Password
                </div>
                <div class="pass-right">
                    <span class="pass-tag">"star"</span>
                    <button class="copy-btn" id="copyBtn" onclick="copyPassword()">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        Copy
                    </button>
                </div>
            </div>

            <!-- Download button -->
            <button class="dl-btn" id="dlBtn">
                <div class="sweep"></div>
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span id="dlBtnText">Download Now</span>
            </button>

            <!-- Secondary actions -->
            <div class="sec-actions">
                <button class="sec-btn danger" onclick="reportLink()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                    Report
                </button>
                <a class="sec-btn" href="/">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Home
                </a>
            </div>

            <!-- Notice -->
            <div class="notice">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>All resources are for <strong>educational &amp; personal use only</strong>. Not affiliated with any software company mentioned.</span>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <a href="/">Editors Community</a> &nbsp;·&nbsp; Educational use only &nbsp;·&nbsp; Password: <strong style="color:#6622ba">star</strong>
    </div>

    <script>
        /* ── Read URL params ── */
        const params  = new URLSearchParams(window.location.search);
        const dlUrl   = params.get('url')     || '#';
        const dlName  = params.get('name')    || 'Software Download';
        const dlCat   = params.get('cat')     || 'Software';
        const dlSect  = params.get('section') || 'Editors Community';
        const dlFrom  = params.get('from')    || '/';

        document.title = dlName + ' — Editors Community';
        document.getElementById('dlTitle').textContent = dlName;
        document.getElementById('dlSub').textContent   = 'Editors Community · ' + dlSect;
        document.getElementById('backBtn').href        = dlFrom;

        /* ── Platform detection ── */
        const catL  = dlCat.toLowerCase();
        const sectL = dlSect.toLowerCase();

        let platformLabel = 'Mac & Windows';
        let typeLabel     = 'Free Download';

        const svgWin = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;
        const svgMac = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`;
        const svgPlg = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>`;
        const svgBld = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/></svg>`;
        const svgGen = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

        let iconSvg = svgGen;

        if (catL.includes('windows') && sectL.includes('software')) {
            platformLabel = 'Windows'; typeLabel = 'Windows Software'; iconSvg = svgWin;
        } else if (catL.includes('mac') && sectL.includes('software')) {
            platformLabel = 'macOS'; typeLabel = 'Mac Software'; iconSvg = svgMac;
        } else if (catL.includes('blender')) {
            platformLabel = 'Blender'; typeLabel = 'Blender Addon'; iconSvg = svgBld;
        } else if (sectL.includes('plugin') || catL.includes('plug')) {
            platformLabel = 'Mac & Windows'; typeLabel = 'Plugin / Extension'; iconSvg = svgPlg;
        }

        document.getElementById('iconRing').innerHTML = iconSvg;

        /* ── Chips ── */
        const chipsEl = document.getElementById('chips');

        function chip(svg, label) {
            const d = document.createElement('div');
            d.className = 'chip';
            d.innerHTML = svg + `<span>${label}</span>`;
            return d;
        }

        const svgPlatform = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;
        const svgType     = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
        const svgFree     = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

        chipsEl.appendChild(chip(svgPlatform, platformLabel));
        chipsEl.appendChild(chip(svgType,     typeLabel));
        chipsEl.appendChild(chip(svgFree,     'Free'));

        /* ── Download click ── */
        const dlBtn     = document.getElementById('dlBtn');
        const dlBtnText = document.getElementById('dlBtnText');

        dlBtn.addEventListener('click', () => {
            if (!dlUrl || dlUrl === '#') return;

            window.open(dlUrl, '_blank', 'noopener,noreferrer');

            // Success state
            dlBtn.classList.add('success');
            dlBtn.querySelector('.sweep').style.animationPlayState = 'paused';
            dlBtnText.textContent = 'Download Started ✓';

            setTimeout(() => {
                dlBtn.classList.remove('success');
                dlBtn.querySelector('.sweep').style.animationPlayState = 'running';
                dlBtnText.textContent = 'Download Again';
            }, 3500);
        });

        /* ── Copy password ── */
        function copyPassword() {
            navigator.clipboard.writeText('star').then(() => {
                const btn = document.getElementById('copyBtn');
                btn.classList.add('copied');
                btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
                }, 2500);
            }).catch(() => {
                /* fallback for non-https */
                const ta = document.createElement('textarea');
                ta.value = 'star'; document.body.appendChild(ta);
                ta.select(); document.execCommand('copy');
                document.body.removeChild(ta);
            });
        }

        /* ── Report ── */
        function reportLink() {
            const s = encodeURIComponent('Broken Link — Editors Community');
            const b = encodeURIComponent(`Hi,\n\nBroken download link:\n\nItem: ${dlName}\nSection: ${dlSect}\nURL: ${dlUrl}\n\nPlease fix. Thanks!`);
            window.open(`mailto:?subject=${s}&body=${b}`, '_blank');
        }
    </script>
</body>
</html>
